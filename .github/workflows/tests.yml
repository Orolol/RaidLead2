name: Tests

# Valide la compilation GDScript et lance la suite de tests headless (Milestone 6, US 6.5).
# Recommandation de l'audit (AuditAmeliorations2.md §6) : aucune CI n'existait, les
# warnings/erreurs n'étaient bloqués nulle part.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Validation GDScript & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot 4.6.2
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false
          include-templates: false

      - name: Import du projet (assets/ressources)
        run: godot --headless --path . --import

      - name: Validation de la syntaxe des scripts
        run: godot --headless --path . res://tests/CheckScripts.tscn

      - name: Suite de tests automatisés
        run: godot --headless --path . res://tests/TestRunner.tscn

      - name: Aperçu du chat vivant (soak, informatif)
        run: godot --headless --path . res://tests/ChatSoak.tscn
        continue-on-error: true
